name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || echo "Lint not configured, skipping"

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: printwearx-static
          path: out/
          retention-days: 7
          if-no-files-found: error

  deploy-preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    timeout-minutes: 5

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: printwearx-static
          path: out/

      - name: Deploy to Cloudflare Pages (preview)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: printwearx
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        env:
          # Override site URL for preview deploys so OG images resolve
          NEXT_PUBLIC_SITE_URL: https://printwearx-preview.pages.dev
